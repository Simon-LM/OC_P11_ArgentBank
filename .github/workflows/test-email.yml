# @format

name: 📧 Test Email Notifications

on:
  workflow_dispatch: # Permet de déclencher manuellement

jobs:
  test-email:
    name: 📧 Test ProtonMail
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Check secrets configuration
        run: |
          if [ -z "${{ secrets.SMTP_USERNAME }}" ] || [ -z "${{ secrets.SMTP_PASSWORD }}" ]; then
            echo "⚠️ SMTP secrets not configured yet"
            echo "Please configure SMTP_USERNAME and SMTP_PASSWORD in repository secrets"
            exit 0
          else
            echo "✅ SMTP secrets are configured"
          fi

      - name: 📧 Test notification
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        env:
          SMTP_USER: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASS: ${{ secrets.SMTP_PASSWORD }}
        with:
          server_address: mail.protonmail.ch
          server_port: 587
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "🧪 Test - Configuration ProtonMail OK"
          to: alerts@lostintab.com
          from: "GitHub Actions <alerts@lostintab.com>"
          body: |
            🎉 SUCCÈS ! Configuration ProtonMail fonctionnelle

            ✅ Secrets GitHub configurés correctement
            ✅ Connexion SMTP ProtonMail établie
            ✅ Workflow prêt pour la production

            🕒 Test effectué le : ${{ github.run_id }}
            👤 Déclenché par : ${{ github.actor }}

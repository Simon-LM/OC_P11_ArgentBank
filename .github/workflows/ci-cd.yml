# @format

name: 🚀 CI/CD Pipeline - ArgentBank

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "8"
  NOTIFICATION_EMAIL: "alerts@lostintab.com"

jobs:
  # ===============================================
  # 📦 BUILD & VALIDATION
  # ===============================================
  build-and-validate:
    name: 🔨 Build & Validate
    runs-on: ubuntu-latest
    outputs:
      build-success: ${{ steps.build.outcome }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "P11-ArgentBank/pnpm-lock.yaml"

      - name: 📥 Install dependencies
        working-directory: P11-ArgentBank
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build production
        id: build
        working-directory: P11-ArgentBank
        run: |
          echo "🔨 Building production build..."
          pnpm run build
          echo "✅ Build completed"

      - name: 🔍 Detect blank pages
        working-directory: P11-ArgentBank
        run: |
          echo "🔍 Checking for blank pages in production build..."

          # Vérifier que dist/ existe
          if [ ! -d "dist" ]; then
            echo "❌ ERROR: dist/ directory not found!"
            exit 1
          fi

          # Vérifier index.html
          if [ ! -f "dist/index.html" ]; then
            echo "❌ ERROR: dist/index.html not found!"
            exit 1
          fi

          # Vérifier que index.html n'est pas vide
          if [ ! -s "dist/index.html" ]; then
            echo "❌ ERROR: dist/index.html is empty!"
            exit 1
          fi

          # Vérifier présence du contenu minimal
          if ! grep -q "<div.*id.*root" "dist/index.html"; then
            echo "❌ ERROR: No root div found in index.html!"
            exit 1
          fi

          # Vérifier présence des assets
          if [ ! -d "dist/assets" ] || [ -z "$(ls -A dist/assets)" ]; then
            echo "❌ ERROR: No assets found in dist/assets!"
            exit 1
          fi

          echo "✅ Build validation passed - no blank pages detected"

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: P11-ArgentBank/dist/
          retention-days: 30

  # ===============================================
  # 🧪 TESTS UNITAIRES
  # ===============================================
  unit-tests:
    name: 🧪 Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: build-and-validate

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "P11-ArgentBank/pnpm-lock.yaml"

      - name: 📥 Install dependencies
        working-directory: P11-ArgentBank
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run unit tests
        working-directory: P11-ArgentBank
        run: |
          echo "🧪 Running Vitest unit tests..."
          pnpm run test:unit
          echo "✅ Unit tests completed"

  # ===============================================
  # 🌐 TESTS E2E & ACCESSIBILITÉ
  # ===============================================
  e2e-accessibility-tests:
    name: 🌐 E2E & Accessibility Tests
    runs-on: ubuntu-latest
    needs: build-and-validate

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "P11-ArgentBank/pnpm-lock.yaml"

      - name: 📥 Install dependencies
        working-directory: P11-ArgentBank
        run: pnpm install --frozen-lockfile

      - name: 📤 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: P11-ArgentBank/dist/

      - name: 🚀 Start production server
        working-directory: P11-ArgentBank
        run: |
          echo "🚀 Starting production server..."
          pnpm run preview &
          sleep 10

          # Vérifier que le serveur répond
          if ! curl -f http://localhost:4173 > /dev/null 2>&1; then
            echo "❌ ERROR: Server not responding!"
            exit 1
          fi
          echo "✅ Production server started on http://localhost:4173"

      - name: 🌐 Run Cypress E2E Tests (with Axe)
        working-directory: P11-ArgentBank
        run: |
          echo "🌐 Running Cypress E2E tests with accessibility checks..."
          echo "Focus: Authentication/Login (route critique)"

          # Cypress inclut déjà cypress-axe pour l'accessibilité
          pnpm run test:e2e:ci
          echo "✅ Cypress E2E tests with Axe completed"

      - name: ♿ Run Pa11y Accessibility Tests (100% required)
        working-directory: P11-ArgentBank
        run: |
          echo "♿ Running Pa11y accessibility tests (100% score required)..."
          cd Pa11y
          node run-pa11y-tests.js
          echo "✅ Pa11y accessibility tests completed (100% requirement)"

      - name: 🔍 Run Lighthouse Audits (100% accessibility required)
        working-directory: P11-ArgentBank
        run: |
          echo "🔍 Running Lighthouse audits..."
          cd lighthouse
          ./run.sh
          echo "✅ Lighthouse audits completed (100% accessibility requirement)"

      - name: 📊 Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            P11-ArgentBank/cypress/reports/
            P11-ArgentBank/Pa11y/screenshots/
            P11-ArgentBank/lighthouse/reports/
          retention-days: 30

  # ===============================================
  # 📧 NOTIFICATIONS
  # ===============================================
  notify-results:
    name: 📧 Notify Results
    runs-on: ubuntu-latest
    needs: [build-and-validate, unit-tests, e2e-accessibility-tests]
    if: always()

    steps:
      - name: 📧 Send notification email
        if: failure()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        env:
          SMTP_USER: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASS: ${{ secrets.SMTP_PASSWORD }}
        with:
          server_address: mail.protonmail.ch
          server_port: 587
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ CI/CD Pipeline Failed - ArgentBank"
          to: ${{ env.NOTIFICATION_EMAIL }}
          from: "GitHub Actions <alerts@lostintab.com>"
          body: |
            🚨 ÉCHEC du pipeline CI/CD ArgentBank

            📊 Statut des jobs:
            • Build & Validation: ${{ needs.build-and-validate.result }}
            • Tests Unitaires: ${{ needs.unit-tests.result }}
            • Tests E2E & Accessibilité: ${{ needs.e2e-accessibility-tests.result }}

            🔗 Détails: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            📝 Commit: ${{ github.sha }}
            👤 Auteur: ${{ github.actor }}
            🌿 Branche: ${{ github.ref_name }}

      - name: ✅ Success notification
        if: success()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        env:
          SMTP_USER: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASS: ${{ secrets.SMTP_PASSWORD }}
        with:
          server_address: mail.protonmail.ch
          server_port: 587
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "✅ CI/CD Pipeline Success - ArgentBank"
          to: ${{ env.NOTIFICATION_EMAIL }}
          from: "GitHub Actions <alerts@lostintab.com>"
          body: |
            ✅ SUCCÈS du pipeline CI/CD ArgentBank

            📊 Tous les tests ont réussi:
            • ✅ Build & Validation des pages
            • ✅ Tests Unitaires (Vitest)
            • ✅ Tests E2E (Cypress + Axe)
            • ✅ Accessibilité Pa11y (100%)
            • ✅ Audits Lighthouse (100% accessibilité)

            🔗 Détails: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            📝 Commit: ${{ github.sha }}
            👤 Auteur: ${{ github.actor }}
            🌿 Branche: ${{ github.ref_name }}

name: 🚀 CI/CD Pipeline - ArgentBank

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  NODE_VERSION: "18"
  PNPM_VERSION: "8"
  NOTIFICATION_EMAIL: "alerts@lostintab.com"

jobs:
  # ===============================================
  # 🔨 BUILD & VALIDATION
  # ===============================================
  build-and-validate:
    name: 🔨 Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "P11-ArgentBank/pnpm-lock.yaml"

      - name: 📥 Install dependencies
        working-directory: P11-ArgentBank
        run: pnpm install --no-frozen-lockfile

      - name: 🌐 Install Vercel CLI globally
        run: npm install -g vercel

      - name: 🔨 Build production
        id: build
        working-directory: P11-ArgentBank
        run: |
          echo "🔨 Building production build..."
          pnpm run build
          echo "✅ Build completed"

      - name: 🔍 Detect blank pages
        working-directory: P11-ArgentBank
        run: |
          echo "🔍 Checking for blank pages in production build..."

          # Vérifier que dist/ existe
          if [ ! -d "dist" ]; then
            echo "❌ ERROR: dist/ directory not found!"
            exit 1
          fi

          # Vérifier index.html
          if [ ! -f "dist/index.html" ]; then
            echo "❌ ERROR: dist/index.html not found!"
            exit 1
          fi

          # Vérifier que index.html n'est pas vide
          if [ ! -s "dist/index.html" ]; then
            echo "❌ ERROR: dist/index.html is empty!"
            exit 1
          fi

          # Vérifier présence du contenu minimal
          if ! grep -q "<div.*id.*root" "dist/index.html"; then
            echo "❌ ERROR: No root div found in index.html!"
            exit 1
          fi

          echo "✅ Build validation passed - no blank pages detected"

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: P11-ArgentBank/dist/

  # ===============================================
  # 🧪 TESTS UNITAIRES
  # ===============================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: build-and-validate

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "P11-ArgentBank/pnpm-lock.yaml"

      - name: 📥 Install dependencies
        working-directory: P11-ArgentBank
        run: pnpm install --no-frozen-lockfile

      - name: 🧪 Run unit tests
        working-directory: P11-ArgentBank
        run: |
          echo "🧪 Running unit tests with Vitest..."
          pnpm run test:unit
          echo "✅ Unit tests completed"

  # ===============================================
  # 🌐 TESTS E2E & ACCESSIBILITÉ
  # ===============================================
  e2e-accessibility-tests:
    name: 🌐 E2E & Accessibility Tests
    runs-on: ubuntu-latest
    needs: build-and-validate

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "P11-ArgentBank/pnpm-lock.yaml"

      - name: 📥 Install dependencies
        working-directory: P11-ArgentBank
        run: pnpm install --no-frozen-lockfile

      - name: 📤 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: P11-ArgentBank/dist/

      - name: 🔧 Start Vercel dev server
        working-directory: P11-ArgentBank
        run: |
          echo "🚀 Starting Vercel dev server for E2E tests..."
          echo "📝 SOLUTION: Using 'vercel dev --token' (Option 2 - token auth required)"

          # Vérifier que le token Vercel est disponible
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "❌ ERROR: VERCEL_TOKEN secret is not configured!"
            echo "📋 Please add VERCEL_TOKEN to GitHub Secrets"
            echo "🔗 Get token from: https://vercel.com/account/tokens"
            exit 1
          fi

          # 🔧 FIX: Renommer vercel.json temporairement (comme en local)
          # vercel dev n'aime pas la config production, exactement comme en développement local
          if [ -f "vercel.json" ]; then
            mv vercel.json vercel-only-prod.json
            echo "📝 Renamed vercel.json → vercel-only-prod.json for dev mode"
          fi

          # 🔧 FIX: Forcer Vercel à IGNORER complètement la config cloud
          echo "🔧 FORCING Vercel to ignore cloud config and use CWD as project root..."

          # Supprimer tout lien avec la config cloud
          rm -rf .vercel 2>/dev/null || true

          # Créer un vercel.json minimal qui force le CWD comme racine
          echo '{
            "version": 2,
            "name": "argentbank-dev",
            "functions": {
              "api/**/*.js": {
                "runtime": "nodejs18.x"
              }
            },
            "builds": [
              {
                "src": "api/**/*.js",
                "use": "@vercel/node"
              }
            ]
          }' > vercel.json

          # SOLUTION: Utiliser --cwd pour forcer le répertoire de travail
          echo "🚀 Starting Vercel with forced CWD and local config..."
          vercel dev --listen 3000 --token $VERCEL_TOKEN --cwd "$(pwd)" --yes &
          VERCEL_PID=$!
          echo "🔢 Vercel dev PID: $VERCEL_PID"

          # Attendre que le serveur soit prêt (augmenté à 45 secondes pour l'auth)
          echo "⏳ Waiting for Vercel dev server to be ready..."
          READY=false
          for i in {1..45}; do
            if curl -f -s http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Server ready after ${i} seconds"
              READY=true
              break
            fi
            echo "⏳ Attempt $i/45..."
            sleep 1
          done

          if [ "$READY" = false ]; then
            echo "❌ ERROR: Vercel dev server failed to start within 45 seconds"
            echo "🔍 Checking Vercel process..."
            if kill -0 $VERCEL_PID 2>/dev/null; then
              echo "📊 Vercel process is still running (PID: $VERCEL_PID)"
            else
              echo "❌ Vercel process has died"
            fi
            
            echo "🔍 Port status:"
            netstat -tlnp | grep :3000 || echo "No process listening on port 3000"
            
            echo "🔍 Recent logs might show the issue:"
            # Pas de logs directs disponibles, mais on peut tester la connexion
            timeout 5 curl -v http://localhost:3000 || echo "Connection test failed"
            
            # Kill le processus et exit
            kill $VERCEL_PID 2>/dev/null || true
            exit 1
          fi

          echo "✅ Vercel dev server is ready on http://localhost:3000"

          # Garder le PID pour le cleanup
          echo "VERCEL_PID=$VERCEL_PID" >> $GITHUB_ENV

        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: 🧪 Run Cypress E2E tests with accessibility
        working-directory: P11-ArgentBank
        run: |
          echo "🧪 Running Cypress E2E tests with Axe accessibility checks..."
          pnpm run test:e2e:ci
          echo "✅ E2E and accessibility tests completed"

      - name: 🛑 Stop Vercel dev server
        if: always()
        working-directory: P11-ArgentBank
        run: |
          if [ ! -z "$VERCEL_PID" ]; then
            echo "🛑 Stopping Vercel dev server (PID: $VERCEL_PID)..."
            kill $VERCEL_PID 2>/dev/null || true
            sleep 2
            # Force kill si nécessaire
            kill -9 $VERCEL_PID 2>/dev/null || true
            echo "✅ Vercel dev server stopped"
          fi

          # Restaurer vercel.json original
          if [ -f "vercel-only-prod.json" ]; then
            mv vercel-only-prod.json vercel.json
            echo "📝 Restored vercel.json from backup"
          fi

  # ===============================================
  # ♿ TESTS ACCESSIBILITÉ (Pa11y + Lighthouse)
  # ===============================================
  accessibility-audit:
    name: ♿ Accessibility Audit
    runs-on: ubuntu-latest
    needs: build-and-validate

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "P11-ArgentBank/pnpm-lock.yaml"

      - name: 📥 Install dependencies
        working-directory: P11-ArgentBank
        run: pnpm install --no-frozen-lockfile

      - name: 📤 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: P11-ArgentBank/dist/

      - name: 🔧 Start Vercel dev server for audits
        working-directory: P11-ArgentBank
        run: |
          echo "🚀 Starting Vercel dev server for accessibility audits..."
          
          # Same setup as E2E tests
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "❌ ERROR: VERCEL_TOKEN secret is not configured!"
            exit 1
          fi

          if [ -f "vercel.json" ]; then
            mv vercel.json vercel-only-prod.json
          fi

          rm -rf .vercel 2>/dev/null || true

          echo '{
            "version": 2,
            "name": "argentbank-dev",
            "functions": {
              "api/**/*.js": {
                "runtime": "nodejs18.x"
              }
            }
          }' > vercel.json

          vercel dev --listen 3000 --token $VERCEL_TOKEN --cwd "$(pwd)" --yes &
          VERCEL_PID=$!

          # Wait for server
          for i in {1..45}; do
            if curl -f -s http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Server ready for audits"
              break
            fi
            sleep 1
          done

          echo "VERCEL_PID=$VERCEL_PID" >> $GITHUB_ENV

        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: ♿ Run Pa11y accessibility tests
        working-directory: P11-ArgentBank
        run: |
          echo "♿ Running Pa11y accessibility tests..."
          npx pa11y http://localhost:3000 --standard WCAG2AA --threshold 0
          npx pa11y http://localhost:3000/signin --standard WCAG2AA --threshold 0
          echo "✅ Pa11y accessibility tests completed"

      - name: 🚀 Run Lighthouse audits
        working-directory: P11-ArgentBank
        run: |
          echo "🚀 Running Lighthouse performance and accessibility audits..."
          npx lighthouse http://localhost:3000 --chrome-flags="--headless --no-sandbox" --output=json --output-path=./lighthouse-home.json
          npx lighthouse http://localhost:3000/signin --chrome-flags="--headless --no-sandbox" --output=json --output-path=./lighthouse-signin.json
          echo "✅ Lighthouse audits completed"

      - name: 🛑 Stop Vercel dev server
        if: always()
        working-directory: P11-ArgentBank
        run: |
          if [ ! -z "$VERCEL_PID" ]; then
            kill $VERCEL_PID 2>/dev/null || true
            sleep 2
            kill -9 $VERCEL_PID 2>/dev/null || true
          fi
          if [ -f "vercel-only-prod.json" ]; then
            mv vercel-only-prod.json vercel.json
          fi

  # ===============================================
  # 📧 NOTIFICATIONS
  # ===============================================
  notify-results:
    name: 📧 Send Results
    runs-on: ubuntu-latest
    needs: [build-and-validate, unit-tests, e2e-accessibility-tests, accessibility-audit]
    if: always()

    steps:
      - name: 📧 Send success notification
        if: needs.build-and-validate.result == 'success' && needs.unit-tests.result == 'success' && needs.e2e-accessibility-tests.result == 'success' && needs.accessibility-audit.result == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: mail.protonmail.ch
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "✅ CI/CD Pipeline Success - ArgentBank"
          to: ${{ env.NOTIFICATION_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}
          body: |
            🎉 **Pipeline Success!**
            
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Triggered by:** ${{ github.event_name }}
            
            ✅ **All checks passed:**
            - Build and validation
            - Unit tests (Vitest)
            - E2E tests with accessibility (Cypress + Axe)
            - Accessibility audits (Pa11y + Lighthouse)
            
            🔗 **View details:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            **Authentication route tested:** /signin → /user ✅

      - name: 📧 Send failure notification
        if: needs.build-and-validate.result == 'failure' || needs.unit-tests.result == 'failure' || needs.e2e-accessibility-tests.result == 'failure' || needs.accessibility-audit.result == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: mail.protonmail.ch
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ CI/CD Pipeline Failure - ArgentBank"
          to: ${{ env.NOTIFICATION_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}
          body: |
            🚨 **Pipeline Failure!**
            
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Triggered by:** ${{ github.event_name }}
            
            ❌ **Failed jobs:**
            - Build: ${{ needs.build-and-validate.result }}
            - Unit Tests: ${{ needs.unit-tests.result }}
            - E2E + Accessibility: ${{ needs.e2e-accessibility-tests.result }}
            - Accessibility Audit: ${{ needs.accessibility-audit.result }}
            
            🔗 **View details:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            **Please check the logs and fix the issues.**
